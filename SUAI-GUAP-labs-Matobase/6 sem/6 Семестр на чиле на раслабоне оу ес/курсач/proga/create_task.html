<!--create_task.html-->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание новой задачи</title>
</head>
<body>
    <h1>Создание новой задачи</h1>
    <form action="create_task.php" method="post">
        <label for="title">Заголовок задачи:</label>
        <input type="text" id="title" name="title" required><br><br>
        <label for="note">Заметка к задаче:</label>
        <textarea id="note" name="note"></textarea><br><br>
        <label for="difficulty">Уровень сложности:</label>
        <select id="difficulty" name="difficulty">
            <option value="easy">Легко</option>
            <option value="medium">Средне</option>
            <option value="hard">Сложно</option>
        </select><br><br>
        <label for="tags">Теги:</label>
        <input type="text" id="tags" name="tags"><br><br>
        <label for="deadline">Предельная дата выполнения:</label>
        <input type="date" id="deadline" name="deadline" required><br><br>
        <button type="submit">Создать задачу</button>
    </form>
</body>
</html>
