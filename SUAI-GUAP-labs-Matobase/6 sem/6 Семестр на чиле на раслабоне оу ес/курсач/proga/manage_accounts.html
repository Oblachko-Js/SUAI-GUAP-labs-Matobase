<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление учетными записями</title>
</head>
<body>
    <h1>Управление учетными записями</h1>
    <form action="manage_accounts.php" method="post">
        <label for="action">Выберите действие:</label>
        <select id="action" name="action">
            <option value="create">Создать</option>
            <option value="read">Просмотреть</option>
            <option value="update">Изменить</option>
            <option value="delete">Удалить</option>
        </select><br><br>
        <label for="username">Имя пользователя:</label>
        <input type="text" id="username" name="username"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>
        <label for="password">Пароль:</label>
        <input type="password" id="password" name="password"><br><br>
        <button type="submit">Выполнить</button>
    </form>
</body>
</html>
