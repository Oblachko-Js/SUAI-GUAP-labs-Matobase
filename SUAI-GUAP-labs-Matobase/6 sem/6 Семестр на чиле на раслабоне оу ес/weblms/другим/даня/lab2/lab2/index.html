<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пример с filterArray</title>
</head>
<body>
  <h2>Результаты фильтрации</h2>
  <div id="output"></div>

  <script>
    // Функция для фильтрации массива
    function filterArray(arr, callback) {
      const result = [];
      for (let i = 0; i < arr.length; i++) {
        if (callback(arr[i])) {
          result.push(arr[i]);
        }
      }
      return result;
    }

    // Пример использования 1: Фильтрация четных чисел
    const numbers = [1, 5, 10, 25, 5, 6, 90, 8, 9, 10];
    const evenNumbers = filterArray(numbers, function(num) {
      return num % 2 === 0; // Проверяем, что число четное
    });

    // Пример использования 2: Фильтрация нечетных чисел
    const oddNumbers = filterArray(numbers, function(num) {
      return num % 2 !== 0; // Проверяем, что число нечетное
    });

    // Выводим результаты на страницу
    const outputDiv = document.getElementById('output');
    outputDiv.innerHTML = `
      <p><strong>Четные числа:</strong> ${evenNumbers.join(', ')}</p>
      <p><strong>Нечетные числа:</strong> ${oddNumbers.join(', ')}</p>
    `;
  </script>
</body>
</html>
