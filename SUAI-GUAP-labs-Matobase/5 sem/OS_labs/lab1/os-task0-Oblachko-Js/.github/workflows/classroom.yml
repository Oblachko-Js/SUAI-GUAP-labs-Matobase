name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Check solution presence for exercise 1
      id: check-solution-presence-for-exercise-1
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Check solution presence for exercise 1
        setup-command: ''
        command: bash -c "if [[ ! -s goals.md ]]; then echo 'No solution found for
          excercise 1'; exit 1; fi"
        timeout: 5
        max-score: 2
    - name: Check solution presence for exercise 2
      id: check-solution-presence-for-exercise-2
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Check solution presence for exercise 2
        setup-command: ''
        command: bash -c "if [[ ! -s info.md ]]; then echo 'No solution found for
          excercise 2'; exit 1; fi"
        timeout: 5
        max-score: 3
    - name: Check solution presence for exercise 3
      id: check-solution-presence-for-exercise-3
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Check solution presence for exercise 3
        setup-command: ''
        command: bash -c "if [[ ! -s report.pdf ]]; then echo 'No solution found for
          exercise 3'; exit 1; fi"
        timeout: 5
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        CHECK-SOLUTION-PRESENCE-FOR-EXERCISE-1_RESULTS: "${{steps.check-solution-presence-for-exercise-1.outputs.result}}"
        CHECK-SOLUTION-PRESENCE-FOR-EXERCISE-2_RESULTS: "${{steps.check-solution-presence-for-exercise-2.outputs.result}}"
        CHECK-SOLUTION-PRESENCE-FOR-EXERCISE-3_RESULTS: "${{steps.check-solution-presence-for-exercise-3.outputs.result}}"
      with:
        runners: check-solution-presence-for-exercise-1,check-solution-presence-for-exercise-2,check-solution-presence-for-exercise-3
